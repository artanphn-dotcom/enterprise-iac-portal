<!DOCTYPE html>
<html lang="sq" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub + Terraform + GCP: Udhëzuesi Enterprise</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-icon">GTG</div>
          <div>
            <span class="logo-text">Enterprise IaC Portal</span>
            <span class="logo-sub">GitHub + Terraform + GCP</span>
          </div>
        </div>
        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" id="search-input" placeholder="Kërko në kapituj...">
        </div>
      </div>

      <nav class="sidebar-menu" id="sidebar-menu">
        <!-- Chapters and sub-chapters dynamically injected by JS -->
      </nav>

      <div class="sidebar-footer">
        <div class="progress-widget">
          <div class="progress-text">
            <span>Progresi i Studimit</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar-fill"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Workspace Area -->
    <main class="main-workspace">
      
      <!-- Top App Header -->
      <header class="app-header">
        <div class="header-title-section">
          <button class="btn-theme-toggle" id="btn-menu-toggle" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <h2 class="header-active-chapter-name" id="header-chapter-title">Mirëseerdhët</h2>
        </div>
        <div class="header-actions">
          <button class="btn btn-outline" id="btn-reset-progress">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
            Rivendos Progresin
          </button>
          <button class="btn-theme-toggle" id="btn-theme-toggle" title="Ndrysho Temën">
            <svg class="sun-icon" style="display: none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
        </div>
      </header>

      <!-- Scrollable Main Content -->
      <section class="content-area" id="content-area">
        <div class="content-inner" id="content-inner">
          <!-- Dynamic Content Injected Here -->
        </div>
      </section>

    </main>

    <!-- Side Detail/Reference Drawer -->
    <div class="detail-drawer" id="detail-drawer">
      <div class="detail-drawer-header">
        <h3 class="detail-drawer-title" id="drawer-title">Detaje mbi Burimin</h3>
        <button class="btn-close-drawer" id="btn-close-drawer">&times;</button>
      </div>
      <div class="detail-drawer-body" id="drawer-body">
        <!-- Dynamic Drawer Properties Injected Here -->
      </div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
